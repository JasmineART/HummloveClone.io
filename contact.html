<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - HummloveClone.io</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .contact-form {
      max-width: 500px;
      margin: 3rem auto;
      background: var(--color-tan);
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      padding: 2rem;
    }
    .contact-form label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--color-black);
      font-weight: 500;
    }
    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 1.5rem;
      border: 1px solid var(--color-black);
      border-radius: 4px;
      font-size: 1rem;
      background: var(--color-white);
      color: var(--color-black);
    }
    .contact-form textarea {
      min-height: 120px;
      resize: vertical;
    }
  </style>
</head>
<body>
  <header>
    <div class="nav-container">
      <h1 class="site-title">HummloveClone.io</h1>
      <button class="nav-toggle" aria-label="Toggle navigation" onclick="toggleNav()">
        &#9776;
      </button>
      <nav id="mainNav">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
        <a href="cart.html">Cart</a>
        <a href="checkout.html">Checkout</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="contact-form">
      <h2 class="text-center text-salmon">Contact Us</h2>
      <form id="contactForm">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>

        <button type="submit" class="button" style="width: 100%;">Send Message</button>
      </form>
      <div id="formResult" class="text-center" style="margin-top: 1.5rem;"></div>
    </section>
  </main>

  <footer class="footer text-center">
    <div class="footer-content">
      <span>&copy; 2025 HummloveClone.io. All rights reserved.</span>
      <nav class="footer-nav">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
        <a href="cart.html">Cart</a>
        <a href="checkout.html">Checkout</a>
      </nav>
    </div>
  </footer>

  <script>
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      document.getElementById('formResult').textContent = 'Thank you for contacting us! We will get back to you soon.';
      document.getElementById('contactForm').reset();
    });
  </script>
  <script>
    function toggleNav() {
      var nav = document.getElementById('mainNav');
      nav.classList.toggle('open');
    }
  </script>
</body>
</html>
