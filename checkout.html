<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - HummloveClone.io</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .checkout-container {
      max-width: 600px;
      margin: 3rem auto;
      background: var(--color-tan);
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      padding: 2rem;
    }
    .checkout-form label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--color-black);
      font-weight: 500;
    }
    .checkout-form input {
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 1.5rem;
      border: 1px solid var(--color-black);
      border-radius: 4px;
      font-size: 1rem;
      background: var(--color-white);
      color: var(--color-black);
    }
    .order-summary {
      margin-bottom: 2rem;
      background: var(--color-white);
      border-radius: 6px;
      padding: 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .order-summary h3 {
      margin-top: 0;
      color: var(--color-salmon);
    }
    .order-summary ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .order-summary li {
      margin-bottom: 0.5rem;
      color: var(--color-black);
    }
    .order-total {
      font-weight: bold;
      color: var(--color-salmon);
      margin-top: 1rem;
      text-align: right;
    }
  </style>
</head>
<body>
  <header>
    <div class="nav-container">
      <h1 class="site-title">HummloveClone.io</h1>
      <button class="nav-toggle" aria-label="Toggle navigation" onclick="toggleNav()">
        &#9776;
      </button>
      <nav id="mainNav">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html">Cart</a>
        <a href="checkout.html" class="active">Checkout</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="checkout-container">
      <h2 class="text-center text-salmon">Checkout</h2>
      <div class="order-summary" id="orderSummary"></div>
      <form id="checkoutForm" class="checkout-form">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required>

        <label for="address">Shipping Address</label>
        <input type="text" id="address" name="address" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <button type="submit" class="button" style="width: 100%;">Place Order</button>
      </form>
      <div id="checkoutResult" class="text-center" style="margin-top: 1.5rem;"></div>
    </div>
  </main>

  <footer class="footer text-center">
    <div class="footer-content">
      <span>&copy; 2025 HummloveClone.io. All rights reserved.</span>
      <nav class="footer-nav">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html">Cart</a>
        <a href="checkout.html" class="active">Checkout</a>
      </nav>
    </div>
  </footer>

  <script>
    // Sample product data (should match cart.html)
    const products = [
      { id: 1, name: 'Handmade Mug', price: 18 },
      { id: 2, name: 'Salmon Throw Pillow', price: 24 },
      { id: 3, name: 'Black Canvas Tote', price: 15 },
      { id: 4, name: 'Tan Pillow', price: 22 },
      { id: 5, name: 'Salmon Mug', price: 19 },
      { id: 6, name: 'Black Mug', price: 20 },
      { id: 7, name: 'Tan Tote', price: 16 },
      { id: 8, name: 'Salmon Tote', price: 17 }
    ];
    function getCart() {
      return JSON.parse(localStorage.getItem('cart') || '[]');
    }
    function renderOrderSummary() {
      const cart = getCart();
      const summary = document.getElementById('orderSummary');
      if (cart.length === 0) {
        summary.innerHTML = '<p class="text-center text-black">Your cart is empty.</p>';
        document.getElementById('checkoutForm').style.display = 'none';
        return;
      }
      let total = 0;
      let items = cart.map(item => {
        const product = products.find(p => p.id === item.id);
        if (!product) return '';
        total += product.price * item.qty;
        return `<li>${product.name} x ${item.qty} - $${(product.price * item.qty).toFixed(2)}</li>`;
      }).join('');
      summary.innerHTML = `
        <h3>Order Summary</h3>
        <ul>${items}</ul>
        <div class="order-total">Total: $${total.toFixed(2)}</div>
      `;
    }
    document.getElementById('checkoutForm').addEventListener('submit', function(e) {
      e.preventDefault();
      localStorage.removeItem('cart');
      document.getElementById('checkoutResult').textContent = 'Thank you for your order! You will receive a confirmation email soon.';
      document.getElementById('checkoutForm').reset();
      renderOrderSummary();
    });
    renderOrderSummary();
  </script>
  <script>
    function toggleNav() {
      var nav = document.getElementById('mainNav');
      nav.classList.toggle('open');
    }
  </script>
</body>
</html>
