<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hummlove - Home</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

    <header class="hummlove-header">

        <div class="top-bar">
            <span class="time">12:41</span>
            <div class="status-icons">
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
                <span class="battery">51 <i class="fas fa-battery-half"></i></span>
            </div>
        </div>

        <div class="main-bar">
            <div class="logo">HUMMLOVE</div>
            <div class="utility-icons">
                <i class="far fa-user"></i>
                <i class="far fa-heart"></i>
                <i class="fas fa-shopping-bag"></i>
                <i class="fas fa-bars"></i>
            </div>
        </div>

        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search within Women's Clothing">
            <i class="fas fa-camera"></i>
        </div>

        <nav class="primary-nav">
            <a href="#" class="active">WOMEN</a>
            <a href="#">PLUS+CURVE</a>
            <a href="#">MEN</a>
            <a href="#">KIDS</a>
            <a href="#">BEAUTY</a>
        </nav>

    </header>

    <main>
        <div class="hero-image">
            <p>Your main content goes here...</p>
        </div>
    </main>
    
</body>
</html>
